<!DOCTYPE html>
<html>
<head>
<title>Staarbox Admin Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#02614e,#eccfa1);

padding:20px;

}

/* LOGIN CARD */

.login-card{

width:100%;
max-width:380px;

padding:40px;

border-radius:16px;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.2);

box-shadow:0 15px 40px rgba(0,0,0,0.35);

color:white;

}

/* LOGO */

.logo{

text-align:center;
margin-bottom:25px;

}

.logo img{

width:130px;
max-width:100%;

}

/* TITLE */

.login-card h2{

text-align:center;
margin-bottom:25px;
font-weight:500;

}

/* INPUT */

.input-group{

margin-bottom:18px;

}

.input-group label{

font-size:13px;
display:block;
margin-bottom:6px;

}

.input-group input{

width:100%;

padding:12px;

border-radius:7px;

border:none;

outline:none;

background:rgba(255,255,255,0.18);

color:white;

font-size:14px;

}

.input-group input::placeholder{

color:#ddd;

}

/* PASSWORD FIELD */

.password-box{

position:relative;

}

.toggle{

position:absolute;

right:10px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

font-size:12px;

color:#fff;

opacity:0.9;

}

/* LOGIN BUTTON */

button{

width:100%;

padding:12px;

border:none;

border-radius:7px;

background:#eccfa1;

color:#111827;

font-size:15px;

cursor:pointer;

margin-top:10px;

transition:0.2s;

}

button:hover{

background:#02614e;

}

/* FOOTER */

.footer{

text-align:center;

margin-top:18px;

font-size:12px;

opacity:0.85;

}

/* RESPONSIVE */

@media (max-width:480px){

.login-card{

padding:30px 22px;

}

.logo img{

width:100px;

}

.login-card h2{

font-size:20px;

}

.input-group input{

padding:10px;

}

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
<img src="./staarbox.png">
</div>

<h2>Admin Login</h2>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="admin@staarbox.in" required>
</div>

<div class="input-group password-box">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>
<span class="toggle" id="toggleBtn" onclick="togglePassword()">Show</span>
</div>

<button type="submit">Login</button>

</form>

<div class="footer">
Staarbox Admin Panel
</div>

</div>

<script>

/* SHOW / HIDE PASSWORD */

function togglePassword(){

const pass=document.getElementById("password");
const toggle=document.getElementById("toggleBtn");

if(pass.type==="password"){

pass.type="text";
toggle.innerText="Hide";

}else{

pass.type="password";
toggle.innerText="Show";

}

}

/* DEMO LOGIN */

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(email==="admin@staarbox.in" && password==="admin123"){

window.location.href="dashboard.html";

}else{

alert("Invalid login credentials");

}

});

</script>

</body>
</html>
